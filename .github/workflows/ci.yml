# SPDX-License-Identifier: Apache-2.0
#
# Reusable build+release for ONE channel. Called by main.yml (channel=main) and
# stable.yml (channel=stable), which own the cadence. Builds the 4-board matrix
# for the given channel and publishes its binaries to a channel-specific release.
# Build-gate only — CI never flashes. GitHub-hosted runners; no self-hosted.

name: ci

on:
  workflow_call:
    inputs:
      channel:
        description: "stable | main — selects west-<channel>.yml"
        required: true
        type: string
      release-tag:
        description: "release tag to (re)publish this channel's binaries to"
        required: true
        type: string
      prerelease:
        description: "mark the release as a pre-release"
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # one red board must not mask the others
      matrix:
        target:
          - id: rpi_4b
            board: rpi_4b
            app: samples/hello_world
            tc: aarch64-zephyr-elf
          - id: pico_w
            board: rpi_pico/rp2040/w
            app: samples/hello_world
            tc: arm-zephyr-eabi
          - id: heltec_v3
            board: heltec_wifi_lora32_v3/esp32s3/procpu
            app: samples/drivers/lora/send
            tc: xtensa-espressif_esp32s3_zephyr-elf
          - id: xiao_ble
            board: xiao_ble
            app: samples/hello_world
            tc: arm-zephyr-eabi

    name: ${{ inputs.channel }} · ${{ matrix.target.id }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: zephyr-builds

      - name: Setup Zephyr (${{ inputs.channel }})
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 # v1.0.14
        with:
          app-path: zephyr-builds
          manifest-file-name: west-${{ inputs.channel }}.yml   # channel selects the manifest
          toolchains: ${{ matrix.target.tc }}
          sdk-version: auto                                     # right SDK per Zephyr version

      - name: Build ${{ matrix.target.board }} — ${{ matrix.target.app }}
        run: |
          west build -p always -b ${{ matrix.target.board }} \
            -d build zephyr/${{ matrix.target.app }}

      - name: Size report
        # Non-failing for now (samples are tiny). A hard DRAM gate lands with
        # real firmware (fail >95% on stable, warn on main).
        run: west build -d build -t ram_report | tee build/ram_report.txt

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs.channel }}-${{ matrix.target.id }}
          path: |
            build/zephyr/zephyr.bin
            build/zephyr/zephyr.elf
            build/ram_report.txt
          retention-days: 14
          if-no-files-found: warn

  # Aggregate this channel's binaries into its release with a sha256sums manifest.
  # Publishes whatever built — a red cell drops out rather than blocking the rest.
  release:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write            # create/replace this channel's release + tag
    steps:
      - name: Download this channel's artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          pattern: ${{ inputs.channel }}-*
          path: artifacts

      - name: Stage assets + sha256sums
        id: stage
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist
          for d in artifacts/*/; do
            n=$(basename "$d")     # e.g. stable-heltec_v3
            if [ -f "$d/zephyr/zephyr.bin" ]; then cp "$d/zephyr/zephyr.bin" "dist/$n.bin"; fi
            if [ -f "$d/zephyr/zephyr.elf" ]; then cp "$d/zephyr/zephyr.elf" "dist/$n.elf"; fi
          done
          cd dist
          assets=( *.bin *.elf )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No build outputs to publish — skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sha256sum "${assets[@]}" > sha256sums.txt
          echo "----- sha256sums.txt -----"; cat sha256sums.txt
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish '${{ inputs.release-tag }}' release
        if: ${{ steps.stage.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Recreate the tag/release each run so stale assets never linger.
          gh release delete "${{ inputs.release-tag }}" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create "${{ inputs.release-tag }}" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --title "${{ inputs.channel == 'stable' && 'Stable firmware' || 'Nightly firmware' }}" \
            --notes "Channel \`${{ inputs.channel }}\`, built from \`${GITHUB_SHA}\`. Assets regenerated each run — verify downloads against \`sha256sums.txt\`."
