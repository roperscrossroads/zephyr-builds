# SPDX-License-Identifier: Apache-2.0
#
# Vanilla Zephyr build matrix: (board × app) targets crossed with two version
# channels (stable = release tag, main = bot-bumped SHA). Build-gate only — CI
# never flashes. GitHub-hosted runners only; no self-hosted, no container.

name: build

on:
  schedule:
    - cron: "23 4 * * *"          # nightly ~04:23 UTC
  workflow_dispatch: {}
  push:
    branches: [main]              # incl. the bump-main commit; add a paths: filter once trusted

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # a broken 'main' channel must NOT mask a green 'stable'
      matrix:
        channel: [stable, main]
        target:
          - id: rpi_4b
            board: rpi_4b
            app: samples/hello_world
            tc: aarch64-zephyr-elf
          - id: pico_w
            board: rpi_pico/rp2040/w
            app: samples/hello_world
            tc: arm-zephyr-eabi
          - id: heltec_v3
            board: heltec_wifi_lora32_v3/esp32s3/procpu
            app: samples/drivers/lora/send
            tc: xtensa-espressif_esp32s3_zephyr-elf
          - id: xiao_ble
            board: xiao_ble
            app: samples/hello_world
            tc: arm-zephyr-eabi

    name: ${{ matrix.channel }} · ${{ matrix.target.id }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: zephyr-builds

      - name: Setup Zephyr (${{ matrix.channel }})
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 # v1.0.14
        with:
          app-path: zephyr-builds
          manifest-file-name: west-${{ matrix.channel }}.yml   # channel selects the manifest
          toolchains: ${{ matrix.target.tc }}
          sdk-version: auto                                     # right SDK per Zephyr version

      - name: Build ${{ matrix.target.board }} — ${{ matrix.target.app }}
        run: |
          west build -p always -b ${{ matrix.target.board }} \
            -d build zephyr/${{ matrix.target.app }}

      - name: Size report
        # Non-failing for now (hello_world is tiny). A hard DRAM gate lands with
        # real firmware (fail >95% on stable, warn on main).
        run: west build -d build -t ram_report | tee build/ram_report.txt

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ matrix.channel }}-${{ matrix.target.id }}
          path: |
            build/zephyr/zephyr.bin
            build/zephyr/zephyr.elf
            build/ram_report.txt
          retention-days: 14
          if-no-files-found: warn

  # Aggregate every cell's binaries into a rolling 'nightly' pre-release with a
  # sha256sums manifest. Publishes whatever built — a red 'main' cell drops out
  # rather than blocking the green 'stable' assets. Skipped on pull_request.
  release:
    needs: build
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write            # create/replace the rolling 'nightly' release + tag
    steps:
      - name: Download all cell artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: artifacts

      - name: Stage assets + sha256sums
        id: stage
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist
          for d in artifacts/*/; do
            n=$(basename "$d")     # e.g. stable-heltec_v3
            if [ -f "$d/zephyr/zephyr.bin" ]; then cp "$d/zephyr/zephyr.bin" "dist/$n.bin"; fi
            if [ -f "$d/zephyr/zephyr.elf" ]; then cp "$d/zephyr/zephyr.elf" "dist/$n.elf"; fi
          done
          cd dist
          assets=( *.bin *.elf )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No build outputs to publish — skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sha256sum "${assets[@]}" > sha256sums.txt
          echo "----- sha256sums.txt -----"; cat sha256sums.txt
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish rolling 'nightly' pre-release
        if: ${{ steps.stage.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Recreate the rolling tag/release each run so stale assets never linger.
          gh release delete nightly --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create nightly dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --title "Nightly firmware" \
            --notes "Rolling nightly build from \`${GITHUB_SHA}\`. Assets are overwritten each run — not a stable release. Verify downloads against \`sha256sums.txt\`."
