#
# MAIN (bleeding-edge) channel manifest — pins upstream Zephyr to a full SHA on
# `main`. The `revision:` below is rewritten nightly by .github/workflows/bump-main.yml
# so every build is reproducible from history AND the bump commit paints green.
# Do not hand-edit the revision; let the bot move it. The 'stable' channel lives
# in west-stable.yml (release tag). Keep everything else in sync between the two.

manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: aa50e830c2e3fc21cf9b739a900b06784c6c86c5  # bot-bumped: main tip
      clone-depth: 1
      import:
        name-allowlist:
          - cmsis
          - cmsis_6
          - hal_espressif        # heltec_wifi_lora32_v3 (esp32s3)
          - hal_nordic           # xiao_ble (nRF52840)
          - hal_rpi_pico         # rpi_pico/rp2040/w
          - hal_stm32            # headroom for STM32WL LoRa boards later
          - hal_xtensa           # esp32s3
          - loramac-node         # SX126x / lora sample (needed present even for native backend)
          - picolibc

  self:
    path: zephyr-builds
